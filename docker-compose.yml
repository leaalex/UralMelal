services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./storage:/app/storage
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/dev.db
      - UPLOAD_PATH=/app/storage

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    volumes:
      - ./client:/app
      - ./packages:/packages
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
      - VITE_ORIGIN=http://localhost:3000
      - VITE_API_TARGET=http://backend:8080

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    volumes:
      - ./admin:/app
      - ./packages:/packages
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
      - VITE_ORIGIN=http://localhost:3000
      - VITE_API_TARGET=http://backend:8080

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/nginx.conf:ro
      - ./storage:/var/www/storage:ro
    depends_on:
      - backend
      - client
      - admin

