services:
  postgres.prod:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-metal_db}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASS:-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend.prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.prod  # Copy from .env.prod.example
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres.prod
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-metal_db}
      DB_USER: ${DB_USER:-user}
      DB_PASS: ${DB_PASS:-pass}
    volumes:
      - uploads_prod:/app/storage
    depends_on:
      postgres.prod:
        condition: service_healthy

  nginx.prod:
    image: nginx:alpine
    volumes:
      - ./nginx/prod.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/var/www/client:ro
      - ./admin/dist:/var/www/admin:ro
      - uploads_prod:/var/www/storage:ro
    ports:
      - "80:80"
    depends_on:
      - backend.prod

volumes:
  postgres_data:
  uploads_prod:
